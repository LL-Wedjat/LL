<section
  class="ph-hero-section relative bg-linear-to-br from-black via-[#1A365D] to-[#1a365d] text-white pt-20 pb-32 md:py-24 px-6">
  <div class="max-w-6xl mx-auto text-center relative min-h-[400px] flex flex-col justify-center items-center">
    <img src="assets/logos/pharaohs-logo.png" alt="Pharaohs International Group" class="mx-auto mb-8 max-w-md w-full" />
    <h1 class="text-3xl md:text-4xl font-bold mb-4" style="font-family: 'Georgia', serif;">
      {{ 'PHARAOHS.HERO.TITLE' | translate }}
    </h1>
    <p class="text-lg md:text-xl text-amber-200 px-2">{{ 'PHARAOHS.HERO.SUBTITLE' | translate }}</p>
  </div>

  <button (click)="scrollToBanner()"
    class="absolute bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1 md:gap-2 group cursor-pointer bg-transparent border border-amber-200/50 hover:border-amber-200/80 rounded-full px-5 md:px-8 py-2 md:py-3 outline-none z-10 transition-all duration-300 hover:shadow-[0_0_15px_rgba(253,230,138,0.2)]">
    <span
      class="text-xs md:text-sm tracking-[0.1em] md:tracking-[0.2em] uppercase whitespace-nowrap text-amber-200/80 group-hover:text-amber-200 transition-colors duration-300 mt-1">
      {{ 'PHARAOHS.HERO.LL_CTA' | translate }}
    </span>
    <svg
      class="w-5 h-5 md:w-6 md:h-6 text-amber-200/80 group-hover:text-amber-200 animate-bounce transition-colors duration-300"
      fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
    </svg>
  </button>
</section>
