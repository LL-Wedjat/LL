<section class="relative bg-linear-to-br from-black via-[#1A365D] to-[#2D4A7A] text-white py-20 px-6">
  <div class="max-w-6xl mx-auto text-center relative min-h-[400px] flex flex-col justify-center items-center">
    <img src="assets/logos/pharaohs-logo.png" alt="Pharaohs International Group" class="mx-auto mb-8 max-w-md w-full" />
    <h1 class="text-3xl md:text-4xl font-bold mb-4" style="font-family: 'Georgia', serif;">
      {{ 'PHARAOHS.HERO.TITLE' | translate }}
    </h1>
    <p class="text-xl text-amber-200">{{ 'PHARAOHS.HERO.SUBTITLE' | translate }}</p>
    
<button (click)="scrollToBanner()" 
            class="absolute bottom-0 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 group cursor-pointer border-none bg-transparent outline-none">
      <span class="text-sm tracking-[0.2em] uppercase text-amber-200/80 group-hover:text-amber-200 transition-colors duration-300">
        {{ 'PHARAOHS.HERO.LL_CTA' | translate }}
      </span>
      <svg class="w-6 h-6 text-amber-200/80 group-hover:text-amber-200 animate-bounce transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
      </svg>
    </button>
  </div>
</section>
