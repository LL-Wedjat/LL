<section class="py-16 px-6 bg-amber-50">
  <div class="max-w-6xl mx-auto">

    <h2 class="text-3xl font-bold text-center text-[#1A365D] mb-12" style="font-family: 'Georgia', serif;">
      {{ 'PHARAOHS.COMPANIES.TITLE' | translate }}
    </h2>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">

      <div class="order-2 lg:order-1">
        @for (item of companies; track item.nameKey; let i = $index) {
        <div class="border-b border-gray-200">
          <button (click)="toggle(i)"
            class="w-full flex items-center justify-between py-5 px-6 text-left hover:bg-gray-50 transition-colors cursor-pointer">
            <span class="text-lg font-semibold text-[#1A365D]">{{ item.nameKey | translate }}</span>
            <span class="text-[#8B4513] text-2xl font-light ml-4 transition-transform duration-300"
              [class.rotate-45]="expandedIndex() === i">
              +
            </span>
          </button>
          @if (expandedIndex() === i) {
          <div class="px-6 pb-5 text-gray-600 leading-relaxed animate-slideDown">
            {{ item.descKey | translate }}
          </div>
          }
        </div>
        }
      </div>

      <div class="order-1 lg:order-2 bg-[#1A365D] rounded-2xl shadow-xl overflow-hidden relative flex flex-col justify-center items-center p-10 h-full min-h-[300px]">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[3px] bg-[#8B4513] shadow-[0_0_10px_rgba(139,69,19,0.5)]"></div>
        <h2 class="text-3xl md:text-4xl font-bold text-center text-white mb-6" style="font-family: 'Georgia', serif;">
          {{ 'PHARAOHS.ORGANIZATION.TITLE' | translate }}
        </h2>
        <div class="w-16 h-1 bg-[#8B4513] mx-auto mb-8 rounded-full"></div>
        <p class="text-lg md:text-xl text-center text-amber-100 font-semibold tracking-wide uppercase leading-relaxed">
          {{ 'PHARAOHS.ORGANIZATION.DESC' | translate }}
        </p>
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-32 h-[3px] bg-[#8B4513] shadow-[0_0_10px_rgba(139,69,19,0.5)]"></div>
      </div>

    </div>

  </div>
</section>
