name: Deploy to OrangeHost

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular SSR App
        run: npm run build

      - name: Push build artifacts to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r dist/LL/browser /tmp/browser
          cp -r dist/LL/server /tmp/server
          cp package.json /tmp/package.json
          cp package-lock.json /tmp/package-lock.json

          cat > /tmp/app.js << 'EOF'
          async function start() {
            await import('./server/server.mjs');
          }
          start();
          EOF

          if git ls-remote --exit-code --heads origin deploy; then
            git checkout -f deploy
            git rm -rf .
          else
            git checkout --orphan deploy
            git rm -rf .
          fi

          cp -r /tmp/browser ./browser
          cp -r /tmp/server ./server
          cp /tmp/package.json ./package.json
          cp /tmp/package-lock.json ./package-lock.json
          cp /tmp/app.js ./app.js

          git add browser server package.json package-lock.json app.js
          git commit -m "deploy: build $(date -u +'%Y-%m-%d %H:%M:%S UTC') from ${GITHUB_SHA::7}"
          git push origin deploy
