name: Deploy to OrangeHost

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular SSR App
        run: npm run build

      - name: Prepare Deployment Folder
        run: |
          mkdir -p deploy_output
          cp -r dist/LL/browser deploy_output/browser
          cp -r dist/LL/server deploy_output/server
          cp package.json deploy_output/package.json
          cp package-lock.json deploy_output/package-lock.json
          cat > deploy_output/app.js << 'EOF'
          async function start() {
            await import('./server/server.mjs');
          }
          start();
          EOF

      - name: Push to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: deploy_output
          clean: true
          commit-message: "deploy: build from ${{ github.sha }}"
