name: Deploy to OrangeHost

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular SSR App
        run: npm run build

      - name: Push build artifacts to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan deploy
          git rm -rf .

          cp -r dist/LL/browser ./browser
          cp -r dist/LL/server ./server
          cp package.json ./package.json
          cp package-lock.json ./package-lock.json

          git add browser server package.json package-lock.json
          git commit -m "deploy: build $(date -u +'%Y-%m-%d %H:%M:%S UTC') from ${GITHUB_SHA::7}"
          git push origin deploy --force
