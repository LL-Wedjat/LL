name: Deploy to OrangeHost

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular SSR App
        run: npm run build

      - name: Prepare Deployment Folder
        run: |
          mkdir -p deploy_output
          cp -r dist/LL/browser deploy_output/browser
          cp -r dist/LL/server deploy_output/server
          cp package.json deploy_output/package.json
          cp package-lock.json deploy_output/package-lock.json
          cat > deploy_output/app.js << 'EOF'
          const http = require('http');
          const fs = require('fs');
          const path = require('path');

          const mimeTypes = {
            '.js': 'application/javascript',
            '.mjs': 'application/javascript',
            '.css': 'text/css',
            '.ico': 'image/x-icon',
            '.png': 'image/png',
            '.jpg': 'image/jpeg',
            '.jpeg': 'image/jpeg',
            '.svg': 'image/svg+xml',
            '.json': 'application/json',
            '.mp4': 'video/mp4'
          };

          async function start() {
            const serverModule = await import('./server/server.mjs');
            const server = http.createServer((req, res) => {
              try {
                 const pathname = req.url.split('?')[0].replace(/^\//, '');
                const ext = path.extname(pathname).toLowerCase();
                
                if (ext && mimeTypes[ext]) {
                  const filePath = path.join(__dirname, 'browser', pathname);
                  fs.readFile(filePath, (err, data) => {
                    if (!err) {
                      res.setHeader('Content-Type', mimeTypes[ext]);
                      res.setHeader('Cache-Control', 'public, max-age=31536000');
                      res.end(data);
                      return;
                    }
                    serverModule.reqHandler(req, res);
                  });
                  return;
                }
                
                serverModule.reqHandler(req, res);
              } catch (e) {
                console.error(e);
                res.statusCode = 500;
                res.end('Internal Server Error');
              }
            });

            const port = process.env.PORT || 4000;
            server.listen(port, () => {
              console.log(`App listening on port ${port}`);
            });
          }
          start();
          EOF

      - name: Push to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: deploy_output
          clean: true
          commit-message: "deploy: build from ${{ github.sha }}"
