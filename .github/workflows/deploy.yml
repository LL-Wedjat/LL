name: Deploy to OrangeHost

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular SSR App
        run: npm run build

      - name: Prepare Deployment Folder
        run: |
          mkdir -p deploy_package
          cp -r dist deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/

      - name: Copy files via SCP to OrangeHost
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORANGEHOST_HOST }}
          username: ${{ secrets.ORANGEHOST_USERNAME }}
          password: ${{ secrets.ORANGEHOST_PASSWORD }}
          port: ${{ secrets.ORANGEHOST_PORT }}
          source: "deploy_package/*"
          target: "${{ secrets.ORANGEHOST_TARGET_DIR }}"
          strip_components: 1

      - name: Execute post-deploy commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORANGEHOST_HOST }}
          username: ${{ secrets.ORANGEHOST_USERNAME }}
          password: ${{ secrets.ORANGEHOST_PASSWORD }}
          port: ${{ secrets.ORANGEHOST_PORT }}
          script: |
            cd ${{ secrets.ORANGEHOST_TARGET_DIR }}
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
            echo "Deployment completed successfully!"
